<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}Meter Dashboard{% endblock %}</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 40px; }
        h1 { color: #2c3e50; }
        ul { list-style-type: none; padding: 0; }
        li { margin: 10px 0; }
        a { color: #2980b9; text-decoration: none; font-size: 1.2em; }
        a:hover { text-decoration: underline; }
        .btn { background: #2980b9; color: #fff; padding: 8px 16px; border: none; border-radius: 4px; text-decoration: none; }
        .btn-primary { background: #2980b9; }
        .btn-outline-primary { border: 1px solid #2980b9; color: #2980b9; background: #fff; }
        .btn-outline-info { border: 1px solid #17a2b8; color: #17a2b8; background: #fff; }
        .badge { padding: 0.3em 0.6em; border-radius: 0.25em; background: #eee; color: #333; }
        .bg-info { background: #17a2b8; color: #fff; }
        .table { width: 100%; border-collapse: collapse; }
        .table th, .table td { border: 1px solid #ddd; padding: 8px; }
        .table th { background: #f8f8f8; }
        .table-striped tr:nth-child(even) { background: #f2f2f2; }
        .text-center { text-align: center; }
        .text-muted { color: #888; }
        .mb-3 { margin-bottom: 1rem; }
        .mb-0 { margin-bottom: 0; }
        .py-5 { padding-top: 3rem; padding-bottom: 3rem; }
        .btn-group-sm .btn { font-size: 0.9em; padding: 4px 10px; }
    </style>
</head>
<body>
    {% block content %}{% endblock %}
</body>
</html>
