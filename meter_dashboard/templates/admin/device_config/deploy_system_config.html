{% extends "admin/base_site.html" %}
{% load i18n %}

{% block content %}
  <h1>Deploy System Config with Options</h1>
  <p>This will deploy the system configuration to the selected Raspberry Pi(s). Tick sections to skip pushing them.</p>
  <form method="post">{% csrf_token %}
    <fieldset class="module aligned">
      <div class="form-row"><label><input type="checkbox" name="exclude_reading"> Skip Reading Configuration</label></div>
      <div class="form-row"><label><input type="checkbox" name="exclude_mqtt"> Skip MQTT Settings</label></div>
      <div class="form-row"><label><input type="checkbox" name="exclude_usb_copy"> Skip USB Copy</label></div>
      <div class="form-row"><label><input type="checkbox" name="exclude_cloud_sync"> Skip Cloud Sync</label></div>
      <div class="form-row"><label><input type="checkbox" name="exclude_logging"> Skip Logging</label></div>
      <div class="form-row"><label><input type="checkbox" name="exclude_legacy_network"> Skip Legacy / Network</label></div>
    </fieldset>

    {% for obj in queryset %}
      <input type="hidden" name="_selected_action" value="{{ obj.pk }}" />
    {% endfor %}
    <input type="hidden" name="action" value="{{ action }}" />
    <input type="hidden" name="apply" value="yes" />
    <div class="submit-row">
      <input type="submit" value="Deploy" class="default" />
      <a href=".." class="cancel-link">Cancel</a>
    </div>
  </form>
{% endblock %}
