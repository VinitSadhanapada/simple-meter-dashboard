
services:
  app:
    build: .
    container_name: meter_dashboard
    environment:
      FIELD_ENCRYPTION_KEY: "FnGEOkgDwIHFA-bUu1ZFuNjKu8Hue9ZPBcfWDhOpA3o="
      DB_HOST: ${DB_HOST:-192.168.112.106}
      DB_PORT: ${DB_PORT:-5432}
      DB_NAME: ${DB_NAME:-mfmdb}
      DB_USER: ${DB_USER:-mfmuser}
      DB_PASSWORD: ${DB_PASSWORD:-devi}
      # Enable async alert dispatching when testing the full pipeline locally
      DISABLE_ALERT_DISPATCH: "0"
      # Point Celery/alerting at the host Redis by default for local testing.
      # This resolves to the host IP inside the container via extra_hosts mapping.
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://host.docker.internal:6379/0}
      REDIS_URL: ${REDIS_URL:-redis://host.docker.internal:6379/0}
      DEVICE_CONFIG_EXPORT_DIR: /app/device_config_exports
    ports:
      - "8000:8000"
    volumes:
      - .:/app
      - ./device_config_exports:/app/device_config_exports
    # If you want the app container to reach the host Redis process on Linux,
    # map host.docker.internal to the host gateway. This requires Docker daemon
    # support for the host-gateway DNS name. See docs if it fails.
    extra_hosts:
      - "host.docker.internal:host-gateway"
  loki:
    image: grafana/loki:3.4.1
    container_name: loki
    restart: unless-stopped
    ports:
      - "3100:3100"
    volumes:
      - /home/isha/Desktop/SMP/DevOps/loki/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki-data:/tmp/loki
    command: -config.file=/etc/loki/loki-config.yaml

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    # Load the grafana-specific env file plus the existing healthcheck env
    # so we can reuse ALERT_SMTP_* values already stored there.
    env_file:
      - .env.grafana
      # - /home/isha/Desktop/SMP/DevOps/healthcheck/.env.healthcheck  # Commented out - file missing
    volumes:
      # Provisioning folder (read-only) - modify path if you use a different repo location
      - /home/isha/Desktop/SMP/DevOps/loki:/etc/grafana/provisioning:ro
      - grafana-data:/var/lib/grafana
    # Map ALERT_* variables (from .env.healthcheck) into Grafana's expected
    # GF_SMTP_* env vars so Grafana's SMTP config is set at startup.
    environment:
      - GF_SMTP_ENABLED=true
      - GF_SMTP_HOST=${ALERT_SMTP_HOST}:${ALERT_SMTP_PORT}
      - GF_SMTP_USER=${ALERT_SMTP_USER}
      - GF_SMTP_PASSWORD=${ALERT_SMTP_PASS}
      - GF_SMTP_FROM_ADDRESS=${ALERT_FROM}
      - GF_SMTP_SKIP_VERIFY=false
      # Also set the GRAFANA_* placeholders used by the notifier/contact-point
      - GRAFANA_SMTP_HOST=${ALERT_SMTP_HOST}
      - GRAFANA_SMTP_PORT=${ALERT_SMTP_PORT}
      - GRAFANA_SMTP_USER=${ALERT_SMTP_USER}
      - GRAFANA_SMTP_PASS=${ALERT_SMTP_PASS}
      - GRAFANA_SMTP_FROM=${ALERT_FROM}
      # ALERT_TO from the .env.healthcheck will be available to provisioning
      # and to the contact point provisioning file.
    extra_hosts:
      - "host.docker.internal:host-gateway"
networks:
  default:
    name: my_app_net

volumes:
  postgres_data:
  # Note: Redis is expected to run on the host at 127.0.0.1:6379 for local tests.
  # If you prefer containerized Redis, add a redis service and remove the
  # extra_hosts mapping above (but avoid binding host port 6379 if a host
  # Redis is already running).
  redis_data:
  grafana-data:
  loki-data:
